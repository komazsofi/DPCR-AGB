name: pts
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - anaconda
dependencies:
  - python=3.8
  - pytorch=2.0.1
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - numpy
  - scipy
  - scikit-learn
  - pandas
  - matplotlib
  - pillow
  - tqdm
  - pyyaml
  - omegaconf
  - hydra-core
  - wandb
  - geopandas=0.12.2
  - fiona
  - pyproj=3.3.1
  - gdal
  - shapely
  - rtree
  - h5py
  - numba
  - pip
  - pip:
    - easydict==1.13
    - tabulate==0.9.0
    - termcolor==2.4.0
    - shortuuid==1.0.13
    - multimethod==1.10
    - torchnet==0.0.4
    - dbscan1d==0.2.2
    - plyfile
    - open3d==0.19.0
    - visdom==0.2.4
    - laspy==2.5.4
    - laszip==0.2.3
    - jupyterlab
    - widgetsnbextension
    - addict==2.4.0
    - pyquaternion==0.9.9
    # MinkowskiEngine must be installed manually after env creation:
    # git clone https://github.com/StefOe/MinkowskiEngine && cd MinkowskiEngine
    # MAX_JOBS=4 python setup.py install --blas=openblas --force_cuda --verbose
